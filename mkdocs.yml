site_name: gwmock Documentation
site_description: A Python package for simulating gravitational-wave detector data for mock data challenges
site_url: https://leuven-gravity-institute.github.io/gwmock
repo_url: https://github.com/Leuven-Gravity-Institute/gwmock
repo_name: gwmock

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
extra_css:
  - style/api.css

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_docstring_attributes: true
            show_docstring_description: true
            show_attributes: true
            show_members: true
            members_order: source
            group_by_category: true
            separate_signature: true
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_submodules: false
            show_bases: true
            show_category_heading: true
            show_signature: true
            merge_init_into_class: true
            show_signature_annotations: true
            show_symbol_type_heading: true
            signature_crossrefs: false
            show_object_full_path: false
            heading_level: 2
            filters:
              - '!^_'
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py

nav:
  - Home: index.md
  - Installation: user-guide/installation.md
  - User Guide:
      - Quick Start: user-guide/quickstart.md
      - Generating Data: user-guide/generating-data.md
      - Reading Data: user-guide/reading-data.md
      - Configuration Files: user-guide/configuration.md
      - Metadata Files: user-guide/metadata.md
      - Examples: user-guide/examples.md
      - Publishing Data to Zenodo: user-guide/repository.md
      - Running Simulations on a Cluster: user-guide/cluster.md
  - API Reference:
      - Overview: reference/index.md
      - gwmock.cli:
          - Overview: reference/gwmock/cli/index.md
          - main: reference/gwmock/cli/main.md
          - simulate: reference/gwmock/cli/simulate.md
          - config: reference/gwmock/cli/config.md
      - gwmock.config: reference/gwmock/config/index.md
      - gwmock.data: reference/gwmock/data/index.md
      - gwmock.detector: reference/gwmock/detector/index.md
      - gwmock.glitch:
          - Overview: reference/gwmock/glitch/index.md
          - base: reference/gwmock/glitch/base.md
          - gengli: reference/gwmock/glitch/gengli_glitch.md
      - gwmock.mixin:
          - Overview: reference/gwmock/mixin/index.md
          - detector: reference/gwmock/mixin/detector.md
          - randomness: reference/gwmock/mixin/randomness.md
          - time_series: reference/gwmock/mixin/time_series.md
          - waveform: reference/gwmock/mixin/waveform.md
      - gwmock.noise:
          - Overview: reference/gwmock/noise/index.md
          - base: reference/gwmock/noise/base.md
          - white: reference/gwmock/noise/white_noise.md
          - colored: reference/gwmock/noise/colored_noise.md
          - correlated: reference/gwmock/noise/correlated_noise.md
      - gwmock.population: reference/gwmock/population/index.md
      - gwmock.signal:
          - Overview: reference/gwmock/signal/index.md
          - base: reference/gwmock/signal/base.md
          - cbc: reference/gwmock/signal/cbc.md
      - gwmock.simulator:
          - Overview: reference/gwmock/simulator/index.md
          - base: reference/gwmock/simulator/base.md
          - state: reference/gwmock/simulator/state.md
      - gwmock.utils:
          - Overview: reference/gwmock/utils/index.md
          - io: reference/gwmock/utils/io.md
          - log: reference/gwmock/utils/log.md
          - random: reference/gwmock/utils/random.md
      - gwmock.waveform: reference/gwmock/waveform/index.md
  - Developer Guide:
      - Contributing: CONTRIBUTING.md
      - Architecture: dev/architecture.md
  - Security: SECURITY.md
  - Troubleshooting: dev/troubleshooting.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  version:
    provider: mike
